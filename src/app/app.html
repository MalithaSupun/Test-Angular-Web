<style>
  :host {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    color: #1f2937;
    display: block;
    min-height: 100dvh;
    background: #f8fafc;
  }

  .app-shell {
    min-height: 100dvh;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
  }

  .brand {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0;
  }

  .nav-links {
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .nav-links a {
    text-decoration: none;
    color: #374151;
    padding: 0.5rem 0.9rem;
    border-radius: 999px;
    transition: background-color 0.2s ease;
  }

  .nav-links a:hover {
    background: #f3f4f6;
  }

  .nav-links a.active {
    background: #2563eb;
    color: #ffffff;
  }

  .page-content {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .hero {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    margin-bottom: 1.5rem;
  }

  .hero h2 {
    margin: 0 0 0.75rem;
    font-size: 2rem;
  }

  .hero p {
    margin: 0;
    color: #6b7280;
    line-height: 1.6;
  }

  @media (max-width: 640px) {
    .topbar {
      flex-direction: column;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .page-content {
      padding: 1.25rem;
    }

    .hero {
      padding: 1.5rem;
    }
  }
</style>

<div class="app-shell">
  <header class="topbar">
    <h1 class="brand">My Angular App</h1>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Home
      </a>
      <a routerLink="/about" routerLinkActive="active">
        About
      </a>
    </nav>
  </header>

  <main class="page-content">
    <section class="hero">
      <h2>Welcome to Angular</h2>
      <p>This is the main layout of your app. Use the navigation above to move between pages.</p>
    </section>

    <router-outlet></router-outlet>
  </main>
</div>
